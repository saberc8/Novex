name: novex-poc

services:
  backend:
    image: ${RUST_IMAGE:-rust:bookworm}
    working_dir: /workspace
    command: bash -lc "source /usr/local/cargo/env && cargo run -p backend-rust"
    environment:
      HTTP_PORT: ${HTTP_PORT:-4398}
      DATABASE_URL: postgres://${COMMON_POSTGRES_USER:-postgres}:${COMMON_POSTGRES_PASSWORD:-postgres}@postgres:5432/${COMMON_POSTGRES_DATABASE:-novex}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-5}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-local-compose-change-this-secret-32chars-min}
      AUTH_JWT_TTL_HOURS: ${AUTH_JWT_TTL_HOURS:-24}
      CORS_ALLOWED_ORIGINS: http://localhost:${ADMIN_PORT:-4399},http://127.0.0.1:${ADMIN_PORT:-4399},http://localhost:${TRAINING_WEB_PORT:-4401},http://127.0.0.1:${TRAINING_WEB_PORT:-4401},http://localhost:${CHAT_WEB_PORT:-4402},http://127.0.0.1:${CHAT_WEB_PORT:-4402},http://localhost:${AGENT_WORKSPACE_PORT:-4403},http://127.0.0.1:${AGENT_WORKSPACE_PORT:-4403}
      MILVUS_ENDPOINT: http://milvus:19530
      MILVUS_TOKEN: ${MILVUS_TOKEN:-root:Milvus}
      GITHUB_CONNECTOR_TOKEN: ${GITHUB_CONNECTOR_TOKEN:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      RIGHT_CODE_DRAW_BASE_URL: ${RIGHT_CODE_DRAW_BASE_URL:-}
      RIGHT_CODE_DRAW_API_KEY: ${RIGHT_CODE_DRAW_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      RERANKER_API_KEY: ${RERANKER_API_KEY:-}
      RERANKER_BASE_URL: ${RERANKER_BASE_URL:-}
      RERANKER_MODEL: ${RERANKER_MODEL:-}
      SCHEDULER_EMBEDDED: "false"
      SCHEDULER_WORKER_ENABLED: "false"
      PARSER_QUEUE_ENABLED: "true"
      PARSER_QUEUE_PUBLISHER_ENABLED: "true"
      PARSER_QUEUE_TICK_SECONDS: "5"
      PARSER_QUEUE_BATCH_SIZE: "50"
      AGENT_QUEUE_ENABLED: ${AGENT_QUEUE_ENABLED:-false}
      AGENT_QUEUE_PUBLISHER_ENABLED: ${AGENT_QUEUE_PUBLISHER_ENABLED:-false}
      AGENT_QUEUE_TICK_SECONDS: ${AGENT_QUEUE_TICK_SECONDS:-2}
      AGENT_QUEUE_BATCH_SIZE: ${AGENT_QUEUE_BATCH_SIZE:-10}
      AGENT_QUEUE_LEASE_SECONDS: ${AGENT_QUEUE_LEASE_SECONDS:-120}
      AGENT_QUEUE_MAX_ATTEMPTS: ${AGENT_QUEUE_MAX_ATTEMPTS:-3}
      PARSER_CALLBACK_TOKEN: ${PARSER_CALLBACK_TOKEN:-local-parser-callback-token-change-me}
      PARSER_CALLBACK_USER_ID: ${PARSER_CALLBACK_USER_ID:-1}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/%2f
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_PARSER_EXCHANGE: novex.parser
      RABBITMQ_PARSER_EXECUTE_QUEUE: novex.parser.execute
      RABBITMQ_PARSER_RETRY_QUEUE: novex.parser.retry
      RABBITMQ_PARSER_DEAD_QUEUE: novex.parser.dead
      RABBITMQ_PARSER_EXECUTE_ROUTING_KEY: parser.execute
      RABBITMQ_PARSER_RETRY_ROUTING_KEY: parser.retry
      RABBITMQ_PARSER_DEAD_ROUTING_KEY: parser.dead
      RABBITMQ_PARSER_RETRY_TTL_MS: "30000"
      RABBITMQ_AGENT_EXCHANGE: novex.agent
      RABBITMQ_AGENT_EXECUTE_QUEUE: novex.agent.execute
      RABBITMQ_AGENT_RETRY_QUEUE: novex.agent.retry
      RABBITMQ_AGENT_DEAD_QUEUE: novex.agent.dead
      RABBITMQ_AGENT_EXECUTE_ROUTING_KEY: agent.execute
      RABBITMQ_AGENT_RETRY_ROUTING_KEY: agent.retry
      RABBITMQ_AGENT_DEAD_ROUTING_KEY: agent.dead
      RABBITMQ_AGENT_RETRY_TTL_MS: "30000"
      RUST_LOG: ${RUST_LOG:-backend_rust=debug,tower_http=info}
    ports:
      - "${BACKEND_PORT:-4398}:${HTTP_PORT:-4398}"
    volumes:
      - ..:/workspace:cached
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - cargo-target:/workspace/target
    networks:
      - default
      - common

  parser-worker:
    image: ${PYTHON_IMAGE:-python:3.12-slim}
    profiles: ["parser"]
    working_dir: /workspace
    command: sh -lc "python3 -m pip install --no-cache-dir -r services/parser-worker/requirements.txt && PYTHONPATH=services/parser-worker python3 -m parser_worker.worker"
    environment:
      PARSER_WORKER_ID: ${PARSER_WORKER_ID:-parser-worker-1}
      PARSER_BACKEND_BASE_URL: http://backend:4398
      PARSER_BACKEND_TOKEN: ${PARSER_CALLBACK_TOKEN:-local-parser-callback-token-change-me}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/%2f
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_PARSER_EXCHANGE: novex.parser
      RABBITMQ_PARSER_EXECUTE_QUEUE: novex.parser.execute
      RABBITMQ_PARSER_RETRY_QUEUE: novex.parser.retry
      RABBITMQ_PARSER_DEAD_QUEUE: novex.parser.dead
      RABBITMQ_PARSER_EXECUTE_ROUTING_KEY: parser.execute
      RABBITMQ_PARSER_RETRY_ROUTING_KEY: parser.retry
      RABBITMQ_PARSER_DEAD_ROUTING_KEY: parser.dead
      RABBITMQ_PARSER_RETRY_TTL_MS: "30000"
      PARSER_WORKER_PREFETCH: "4"
      PARSER_WORKER_LEASE_TTL_SECONDS: "300"
      PARSER_WORKER_IDEMPOTENCY_TTL_SECONDS: "86400"
      PARSER_WORKER_MODE: ${PARSER_WORKER_MODE:-type-routed}
      MINERU_TOKEN: ${MINERU_TOKEN:-}
      MINERU_TIMEOUT_SECONDS: ${MINERU_TIMEOUT_SECONDS:-120}
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ..:/workspace:cached
    networks:
      - default
      - common

  admin:
    image: ${NODE_IMAGE:-node:24-bookworm-slim}
    profiles: ["apps"]
    working_dir: /workspace/admin
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-4398}
    ports:
      - "${ADMIN_PORT:-4399}:4399"
    depends_on:
      - backend
    volumes:
      - ..:/workspace:cached
      - pnpm-store:/root/.local/share/pnpm/store
      - admin-node-modules:/workspace/admin/node_modules

  training-web:
    image: ${NODE_IMAGE:-node:24-bookworm-slim}
    profiles: ["apps"]
    working_dir: /workspace/apps/training-web
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-4398}
    ports:
      - "${TRAINING_WEB_PORT:-4401}:4401"
    depends_on:
      - backend
    volumes:
      - ..:/workspace:cached
      - pnpm-store:/root/.local/share/pnpm/store
      - training-node-modules:/workspace/apps/training-web/node_modules

  chat-web:
    image: ${NODE_IMAGE:-node:24-bookworm-slim}
    profiles: ["apps"]
    working_dir: /workspace/apps/chat-web
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-4398}
    ports:
      - "${CHAT_WEB_PORT:-4402}:4402"
    depends_on:
      - backend
    volumes:
      - ..:/workspace:cached
      - pnpm-store:/root/.local/share/pnpm/store
      - chat-node-modules:/workspace/apps/chat-web/node_modules

  agent-workspace:
    image: ${NODE_IMAGE:-node:24-bookworm-slim}
    profiles: ["apps"]
    working_dir: /workspace/apps/agent-workspace
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-4398}
    ports:
      - "${AGENT_WORKSPACE_PORT:-4403}:4403"
    depends_on:
      - backend
    volumes:
      - ..:/workspace:cached
      - pnpm-store:/root/.local/share/pnpm/store
      - agent-node-modules:/workspace/apps/agent-workspace/node_modules

volumes:
  cargo-registry:
  cargo-git:
  cargo-target:
  pnpm-store:
  admin-node-modules:
  training-node-modules:
  chat-node-modules:
  agent-node-modules:

networks:
  common:
    external: true
    name: ${COMMON_DOCKER_NETWORK:-docker-common_default}
