name: novex-poc

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: avalon_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d avalon_admin"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  etcd:
    image: ${ETCD_IMAGE:-quay.io/coreos/etcd:v3.5.18}
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd-data:/etcd

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-01-20T14-49-07Z}
    command: server /minio_data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/minio_data

  milvus:
    image: ${MILVUS_IMAGE:-milvusdb/milvus:v2.5.4}
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-9091}:9091"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus-data:/var/lib/milvus

  backend:
    image: ${RUST_IMAGE:-rust:1.85-bookworm}
    working_dir: /workspace
    command: bash -lc "cargo run -p backend-rust"
    environment:
      HTTP_PORT: "4398"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/avalon_admin
      DATABASE_MAX_CONNECTIONS: "5"
      DB_AUTO_MIGRATE: "true"
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-local-compose-change-this-secret-32chars-min}
      AUTH_JWT_TTL_HOURS: "24"
      CORS_ALLOWED_ORIGINS: http://localhost:${ADMIN_PORT:-4399},http://127.0.0.1:${ADMIN_PORT:-4399},http://localhost:${TRAINING_WEB_PORT:-4401},http://127.0.0.1:${TRAINING_WEB_PORT:-4401},http://localhost:${CHAT_WEB_PORT:-4402},http://127.0.0.1:${CHAT_WEB_PORT:-4402},http://localhost:${AGENT_WORKSPACE_PORT:-4403},http://127.0.0.1:${AGENT_WORKSPACE_PORT:-4403}
      MILVUS_ENDPOINT: http://milvus:19530
      MILVUS_TOKEN: ${MILVUS_TOKEN:-root:Milvus}
      GITHUB_CONNECTOR_TOKEN: ${GITHUB_CONNECTOR_TOKEN:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      RIGHT_CODE_DRAW_BASE_URL: ${RIGHT_CODE_DRAW_BASE_URL:-}
      RIGHT_CODE_DRAW_API_KEY: ${RIGHT_CODE_DRAW_API_KEY:-}
      SCHEDULER_EMBEDDED: "false"
      SCHEDULER_WORKER_ENABLED: "false"
      RUST_LOG: backend_rust=debug,tower_http=info
    ports:
      - "${BACKEND_PORT:-4398}:4398"
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_started
    volumes:
      - ..:/workspace:cached
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - cargo-target:/workspace/target

  admin:
    image: ${NODE_IMAGE:-node:24-bookworm-slim}
    profiles: ["apps"]
    working_dir: /workspace/admin
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-4398}
    ports:
      - "${ADMIN_PORT:-4399}:4399"
    depends_on:
      - backend
    volumes:
      - ..:/workspace:cached
      - pnpm-store:/root/.local/share/pnpm/store
      - admin-node-modules:/workspace/admin/node_modules

  training-web:
    image: ${NODE_IMAGE:-node:24-bookworm-slim}
    profiles: ["apps"]
    working_dir: /workspace/apps/training-web
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-4398}
    ports:
      - "${TRAINING_WEB_PORT:-4401}:4401"
    depends_on:
      - backend
    volumes:
      - ..:/workspace:cached
      - pnpm-store:/root/.local/share/pnpm/store
      - training-node-modules:/workspace/apps/training-web/node_modules

  chat-web:
    image: ${NODE_IMAGE:-node:24-bookworm-slim}
    profiles: ["apps"]
    working_dir: /workspace/apps/chat-web
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-4398}
    ports:
      - "${CHAT_WEB_PORT:-4402}:4402"
    depends_on:
      - backend
    volumes:
      - ..:/workspace:cached
      - pnpm-store:/root/.local/share/pnpm/store
      - chat-node-modules:/workspace/apps/chat-web/node_modules

  agent-workspace:
    image: ${NODE_IMAGE:-node:24-bookworm-slim}
    profiles: ["apps"]
    working_dir: /workspace/apps/agent-workspace
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-4398}
    ports:
      - "${AGENT_WORKSPACE_PORT:-4403}:4403"
    depends_on:
      - backend
    volumes:
      - ..:/workspace:cached
      - pnpm-store:/root/.local/share/pnpm/store
      - agent-node-modules:/workspace/apps/agent-workspace/node_modules

volumes:
  postgres-data:
  etcd-data:
  minio-data:
  milvus-data:
  cargo-registry:
  cargo-git:
  cargo-target:
  pnpm-store:
  admin-node-modules:
  training-node-modules:
  chat-node-modules:
  agent-node-modules:
